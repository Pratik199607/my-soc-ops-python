<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div class="modal-panel p-6 max-w-xs w-full text-center animate-pop">
        <div class="text-6xl mb-4">🏆</div>
        <h2 class="text-3xl font-bold text-accent-strong mb-2">Hunt Complete!</h2>
        <p class="text-muted mb-6">You found everyone on the list! Fantastic work connecting with the group.</p>

        <div class="flex flex-col gap-2">
            <button
                hx-post="/start?mode=scavenger_hunt"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full btn-primary py-3 text-lg font-semibold active-scale">
                Hunt Again
            </button>
            <button
                hx-post="/start?mode=bingo"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full btn-secondary py-3 text-lg font-semibold active-scale">
                Try Bingo
            </button>
            <button
                hx-post="/reset"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full btn-secondary py-3 text-lg font-semibold active-scale">
                Back to Menu
            </button>
        </div>
    </div>
</div>
