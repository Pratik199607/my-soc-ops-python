<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div class="modal-panel p-6 max-w-xs w-full text-center animate-pop">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-3xl font-bold text-accent-strong mb-2">Bingo Blast!</h2>
        <p class="text-muted mb-6">You completed a winning line. Keep marking squares and see how many more matches you can find.</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-primary py-3 text-lg font-semibold active-scale">
            Keep Playing
        </button>
    </div>
</div>
